<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Luciana</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fdfae6; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        
        /* Estilo para las imágenes normales */
        img { width: 100%; height: auto; display: block; margin: 0; padding: 0; }

        /* Estilo para las imágenes que son botones */
        .btn-img { cursor: pointer; transition: transform 0.2s; }
        .btn-img:active { transform: scale(0.98); } /* Efecto de pulsado */

        /* Ocultamos las secciones que no deben verse al inicio */
        #seccion-deslizable, #foto5 { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <img src="1.png.jpeg" alt="Parte 1" class="btn-img" id="foto1">

        <div id="seccion-deslizable">
            <img src="2.png.jpeg" alt="Parte 2">
            <img src="3.png.jpeg" alt="Parte 3">
            
            <img src="4.png.jpeg" alt="Parte 4" class="btn-img" id="foto4">
        </div>

        <img src="5.png.jpeg" alt="Parte 5" id="foto5">
    </div>

    <script>
        // Elementos de la página
        const foto1 = document.getElementById('foto1');
        const seccionDeslizable = document.getElementById('seccion-deslizable');
        const foto4 = document.getElementById('foto4');
        const foto5 = document.getElementById('foto5');

        // FUNCIÓN 1: Clic en Foto 1 (Ver Regalo)
        foto1.addEventListener('click', function() {
            seccionDeslizable.style.display = 'block'; // Muestra las fotos 2, 3 y 4
            foto1.style.display = 'none'; // Oculta la foto 1
            window.scrollTo(0, 0); // Sube al inicio de la nueva sección
        });

        // FUNCIÓN 2: Clic en Foto 4 (La Carta)
        foto4.addEventListener('click', function() {
            foto5.style.display = 'block'; // Muestra la foto 5
            seccionDeslizable.style.display = 'none'; // Oculta todo lo anterior (2, 3, 4)
            window.scrollTo(0, 0); // Sube al inicio de la sorpresa final
        });
    </script>

</body>
</html>
